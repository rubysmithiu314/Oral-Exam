<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Oral Exam Simulator — Foundations & Grantmaking</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0f0f0f; color: #e8e0d0; font-family: Georgia, 'Times New Roman', serif; min-height: 100vh; }
  textarea:focus { outline: 2px solid #4a7a4a; }
  button:hover { opacity: 0.85; }
  ::-webkit-scrollbar { width: 6px; } 
  ::-webkit-scrollbar-track { background: #1a1a1a; }
  ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const QUESTIONS = [
  { id: 1, text: "How do philanthropic foundations influence public priorities, and what concerns does that raise about legitimacy and accountability?", concepts: ["hyper-agency", "tax-exempt subsidy", "agenda-setting power", "democratic accountability deficit", "Frumkin's normative legitimacy"], hints: "Connect independence → influence → legitimacy concerns → accountability gaps. Use the tax subsidy argument." },
  { id: 2, text: "What makes a foundation legitimate or illegitimate? What sources of legitimacy matter most, and why?", concepts: ["prestige", "government/legal legitimacy", "social acceptance", "Frumkin's normative/substantive dimension", "justice as legitimacy source"], hints: "Move through the 3 sources, then push to the 4th (justice). Argue why justice is necessary, not optional." },
  { id: 3, text: "To whom are foundations accountable, in what ways is that accountability exercised, and how meaningful is it in practice? What, if anything, should be different?", concepts: ["financial/program/ethical accountability", "beyond legal compliance", "5% payout requirement", "IRS as weak mechanism", "grantee vs. donor vs. public accountability"], hints: "Distinguish legal accountability (weak) from meaningful accountability (rare). Then argue what should change." },
  { id: 4, text: "What roles do foundations play beyond funding, and why do those roles matter?", concepts: ["social movement influence", "field building", "knowledge generation", "policy influence", "governance networks", "innovation", "justice role"], hints: "Use the 8 roles framework. Stress that non-funding roles raise legitimacy questions — who authorized this?" },
  { id: 5, text: "What distinguishes strategic philanthropy from more relational or trust-based approaches?", concepts: ["top-down vs. bottom-up", "funder-set vs. emergent strategy", "metrics-driven vs. relationship-driven", "TBP 6 practices", "Wilson et al. tensions"], hints: "Frame as a spectrum, not a binary. Use the DRWI case — they started strategic and learned their way into relational." },
  { id: 6, text: "What are the strengths and limitations of trust-based philanthropy?", concepts: ["unrestricted multi-year funding", "streamlined reporting", "funder transparency", "racial equity centering", "accountability diffusion risk", "measurement challenges"], hints: "Steelman TBP first, then honestly name the tensions: who's accountable when things go wrong?" },
  { id: 7, text: "In practice, what changes when a foundation shifts from a more strategic approach to a more relational one, or vice versa?", concepts: ["DRWI/William Penn Foundation case", "Mintzberg: you learn a strategy", "4 tensions from Wilson et al.", "grantee relationships", "reporting requirements"], hints: "Get concrete: reporting changes, who sets goals changes, relationship dynamic changes, evaluation approach changes." },
  { id: 8, text: "What does it mean for a foundation to be effective?", concepts: ["outputs vs. outcomes vs. impact", "Katz definition", "Porter & Kramer (grantee performance)", "Kohl-Arenas critique", "effective for whom?"], hints: "Start with the measurement-focused definition, then complicate it: effective for whom? Does hitting goals = effectiveness if root causes untouched?" },
  { id: 9, text: "What gets overlooked when effectiveness is defined too narrowly?", concepts: ["short-term vs. long-term change", "individual programs vs. systems change", "countable vs. meaningful outcomes", "Kohl-Arenas: power and inequality"], hints: "The measurement paradox: what's easiest to count starts to define what foundations value. That's a power move, not a neutral choice." },
  { id: 10, text: "How should foundations think about impact and evaluation?", concepts: ["internal vs. external evaluation", "pressure to misrepresent findings", "grantee pressure", "TBP evaluation approach", "ethical dilemmas"], hints: "Surface the tensions: foundations want success, grantees feel pressure, important outcomes take too long. TBP reframes toward learning over proving." },
  { id: 11, text: "Is it possible for foundations to create meaningful social change? Why or why not?", concepts: ["hyper-agency potential", "Villanueva's critique", "Kohl-Arenas (managing vs. structural change)", "social movement influence", "restricted vs. unrestricted funding"], hints: "Yes and no is strongest. Yes: independence gives real power. But: they often fund what's legible, not what transforms." },
  { id: 12, text: "What does a responsible exit look like for a foundation?", concepts: ["grantee sustainability", "advance notice", "exit as legitimacy/accountability question", "community impact", "TBP vs. strategic exit implications"], hints: "Connect exit to legitimacy — if you entered communities, you have obligations. TBP implies different exit responsibilities than strategic." }
];

const SCENARIOS = [
  { id: "A", title: "The Strategy Pivot", text: "The Meridian Foundation has spent 8 years funding grassroots environmental justice organizations with unrestricted, multi-year grants. A new board chair — a former management consultant — wants to shift to a more 'rigorous' strategic approach: setting specific measurable targets, requiring detailed reporting, and funding only organizations that align with Meridian's new theory of change. Several long-term grantees say this will change the nature of their work. How should the foundation approach this situation?" },
  { id: "B", title: "The Accountability Crisis", text: "A regional foundation gave a $2M unrestricted grant to a community health organization. Two years in, a local newspaper reports the organization has low staff morale, unclear financials, and no measurable outcomes. The board wants to require detailed quarterly reports and a new strategic plan, or the organization loses funding. The director argues this would undermine trust and compromise their community-first model. What should the foundation do?" },
  { id: "C", title: "The Participatory Process", text: "The Halloran Family Foundation wants to transition to participatory grantmaking — letting community members decide who gets funded in their education program. Staff are excited but worried: community members may fund organizations that don't align with Halloran's theory of change, the process will take longer, and some board members are skeptical the community has the 'expertise' to make good decisions. How should the foundation proceed?" },
  { id: "D", title: "The Exit Decision", text: "After 12 years of funding youth development nonprofits in a mid-sized city, the Brennan Foundation is shifting focus to rural communities nationally. Many organizations have become financially dependent on Brennan. The foundation plans to notify grantees in April that funding ends in June — two months notice. Several nonprofit leaders say this will force layoffs and possible closures. How should Brennan handle this exit?" },
  { id: "E", title: "The Evaluation Dilemma", text: "The Westfield Foundation commissioned an external evaluation of its 5-year workforce development initiative. The evaluation finds the program significantly improved participants' job skills and confidence, but had no measurable effect on actual employment rates — the stated primary goal. The communications director wants to highlight the positive skill-building results in a press release and quietly shelve the employment findings. What should the foundation do?" },
  { id: "F", title: "The Influence Question", text: "A large private foundation is considering funding a network of civic organizations to advocate for a specific education policy it believes will reduce inequality. The foundation would provide $10M over three years — a transformative amount for these organizations. Critics argue the foundation is purchasing policy outcomes with tax-advantaged dollars. Foundation leaders argue they're supporting democratic participation. Is this legitimate? How should they proceed?" },
  { id: "G", title: "The Legibility Trap", text: "A foundation's program officer is reviewing applications for a community mental health initiative. Two organizations stand out: one has strong data, a proven model, and measurable outcomes from similar programs. The other is a small, community-led organization deeply trusted in its neighborhood, but has minimal data infrastructure and proposes work that's harder to measure. The foundation typically funds the first type. Should they here?" }
];

const COURSE_CONTEXT = `You are helping graduate students prepare for an oral synthesis exam in a "Grantmaking and the Role of Foundations" course at the Lilly Family School of Philanthropy, IU Indianapolis (Spring 2026, Professor Ash Enrici).

Key course concepts:
- Foundation uniqueness: hyper-agency, independence, tax-exempt status (subsidized by taxpayers), 5% payout requirement
- Legitimacy sources: prestige, government/legal, social acceptance, justice (Frumkin: normative + substantive dimensions)
- Accountability: financial, program, ethical; beyond legal compliance; gaps in meaningful accountability
- Foundation roles (8): funding, social movements, governance networks, field building, knowledge generation, policy influence, innovation, justice
- Strategic vs. emergent/relational grantmaking: top-down vs. bottom-up, metrics-driven vs. relationship-driven
- Trust-Based Philanthropy (TBP) 6 practices: multi-year unrestricted funding, do the homework, streamline paperwork, be transparent/responsive, solicit/act on feedback, support beyond the check
- Relational philanthropy umbrella: TBP, participatory grantmaking (Gibson 2018), community philanthropy (Doan 2018)
- Wilson et al. DRWI/William Penn Foundation: 4 tensions (upfront planning vs. emergent, top-down vs. bottom-up, strategic focus vs. flexibility, ambition vs. realism); Mintzberg: "you don't plan a strategy, you learn a strategy"
- Outputs vs. outcomes vs. impact distinction
- Effectiveness: Katz (measurement-focused), Porter & Kramer (grantee performance), Kohl-Arenas (managing problems vs. structural change), "effective for whom?"
- Evaluation challenges: pressure to misrepresent, grantee pressure, outcomes take too long, TBP reframes toward learning
- Villanueva (Decolonizing Wealth): logic models not applicable; "sex appeal" funding games distort movement priorities

Evaluate the student's practice answer. Be direct and specific: which concepts were used well, what was missed or underdeveloped, how well ideas were connected, how concretely the scenario was addressed. Keep feedback under 300 words. End with 2 targeted suggestions.`;

const CONCEPTS = [
  { label: "Legitimacy (Frumkin)", body: "3 sources: prestige, government/legal, social acceptance — but requires a 4th: justice. Must have normative (rightful duty) AND substantive (wise discharge of responsibilities) dimensions. 'Social acceptance of the right to exercise power' is necessary but insufficient." },
  { label: "Accountability (3 dimensions)", body: "Financial, program effectiveness, ethical conduct. Goes BEYOND legal compliance. Key gap: foundations face upward accountability (donors, IRS) but minimal downward accountability (grantees, communities). 5% payout rule = weak floor, not meaningful accountability." },
  { label: "Hyper-Agency", body: "Foundations are uniquely independent actors. No market pressures, no elections, minimal regulation. This enables bold action — but also unaccountable influence over public priorities subsidized by taxpayer money." },
  { label: "Strategic vs. Relational Grantmaking", body: "Strategic: top-down, funder-sets-agenda, metrics-driven, assumes funder expertise. Risks: rigidity, treating grantees as contractors. Relational/emergent: bottom-up, grantee expertise centered, strategy emerges. Risks: diffuse accountability, hard to measure. Neither inherently superior — context matters." },
  { label: "TBP — 6 Practices", body: "1) Multi-year unrestricted funding  2) Do the homework (funder learns about grantee)  3) Streamline paperwork  4) Be transparent & responsive  5) Solicit & act on feedback  6) Offer support beyond the check. Core claim: funder over-control is the root problem." },
  { label: "Wilson et al. — 4 Tensions", body: "DRWI/William Penn case: 1) Upfront planning vs. emergent strategy  2) Top-down management vs. bottom-up input  3) Strategic focus vs. opportunistic flexibility  4) Ambitious aspirations vs. realistic expectations. Mintzberg: 'You don't plan a strategy, you learn a strategy.'" },
  { label: "Outputs → Outcomes → Impact", body: "Outputs: what was done (grants made, workshops held). Outcomes: short-term change (skills gained, relationships strengthened). Impact: long-term/systemic change (policy, inequality reduction). Foundations often blur these — or measure only outputs and call it impact." },
  { label: "Effectiveness Debates", body: "Katz: effectiveness = measuring and improving impact. Porter & Kramer: measure own success by grantee performance. Kohl-Arenas: philanthropy often manages problems without confronting power structures. Key question: effective FOR WHOM? Foundation ≠ grantee ≠ community definitions." },
  { label: "Villanueva Critique", body: "Foundations have logic models/theories of change 'not applicable to the real world.' Fund seekers perform: dangling projects with 'sex appeal' or trendy buzzwords. Funding games distort social movement priorities toward funder preferences." },
  { label: "Foundation Roles (8)", body: "Funding, social movements, governance networks, field building, knowledge generation, policy influence, innovation, justice. Non-funding roles are often invisible but potent — and raise legitimacy questions nobody asked the foundation to play." }
];

function ConceptCard({ label, body }) {
  const [open, setOpen] = useState(false);
  return (
    <div style={{ borderBottom: "1px solid #222", paddingBottom: "8px", marginBottom: "8px" }}>
      <button onClick={() => setOpen(!open)} style={{ background: "none", border: "none", color: "#c8c0b0", cursor: "pointer", width: "100%", textAlign: "left", padding: "6px 0", fontSize: "14px", display: "flex", justifyContent: "space-between", fontFamily: "Georgia, serif" }}>
        <span>{label}</span>
        <span style={{ color: "#555", minWidth: "16px", textAlign: "right" }}>{open ? "−" : "+"}</span>
      </button>
      {open && <div style={{ fontSize: "13px", color: "#888", lineHeight: "1.7", paddingBottom: "8px" }}>{body}</div>}
    </div>
  );
}

function App() {
  const [phase, setPhase] = useState("home");
  const [selectedQuestion, setSelectedQuestion] = useState(null);
  const [selectedScenario, setSelectedScenario] = useState(null);
  const [prepTime, setPrepTime] = useState(300);
  const [prepActive, setPrepActive] = useState(false);
  const [userAnswer, setUserAnswer] = useState("");
  const [feedback, setFeedback] = useState("");
  const [loading, setLoading] = useState(false);
  const [studyView, setStudyView] = useState(null);
  const timerRef = useRef(null);

  const drawRandom = () => {
    setSelectedQuestion(QUESTIONS[Math.floor(Math.random() * QUESTIONS.length)]);
    setSelectedScenario(SCENARIOS[Math.floor(Math.random() * SCENARIOS.length)]);
    setUserAnswer(""); setFeedback(""); setPrepTime(300); setPrepActive(false);
    setPhase("prep");
  };

  const pickQuestion = (q) => {
    setSelectedQuestion(q);
    setSelectedScenario(SCENARIOS[Math.floor(Math.random() * SCENARIOS.length)]);
    setUserAnswer(""); setFeedback(""); setPrepTime(300); setPrepActive(false);
    setPhase("prep");
  };

  useEffect(() => {
    if (prepActive && prepTime > 0) {
      timerRef.current = setTimeout(() => setPrepTime(t => t - 1), 1000);
    } else if (prepTime === 0) setPrepActive(false);
    return () => clearTimeout(timerRef.current);
  }, [prepActive, prepTime]);

  const getFeedback = async () => {
    if (!userAnswer.trim()) return;
    setLoading(true); setFeedback("");
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          system: COURSE_CONTEXT,
          messages: [{ role: "user", content: `Big Question: "${selectedQuestion.text}"\n\nScenario: "${selectedScenario.title}" — ${selectedScenario.text}\n\nStudent's practice answer:\n"${userAnswer}"\n\nEvaluate their answer.` }]
        })
      });
      const data = await res.json();
      setFeedback(data.content?.map(b => b.text || "").join("") || "No feedback returned.");
      setPhase("feedback");
    } catch (e) { setFeedback("Error getting feedback. Try again."); }
    setLoading(false);
  };

  const mins = Math.floor(prepTime / 60);
  const secs = prepTime % 60;
  const pct = (prepTime / 300) * 100;
  const circleR = 40, circumference = 2 * Math.PI * circleR;
  const dashOffset = circumference * (1 - pct / 100);

  const btn = (variant) => {
    const base = { cursor: "pointer", borderRadius: "4px", fontSize: "13px", letterSpacing: "0.03em", border: "1px solid", padding: "8px 16px", fontFamily: "Georgia, serif", transition: "opacity 0.15s" };
    if (variant === "primary") return { ...base, background: "#2a4a2a", borderColor: "#4a7a4a", color: "#8dba8d" };
    if (variant === "active") return { ...base, background: "#3a4a2a", borderColor: "#6a8a4a", color: "#aada8d" };
    return { ...base, background: "transparent", borderColor: "#333", color: "#666" };
  };

  return (
    <div style={{ minHeight: "100vh", background: "#0f0f0f", color: "#e8e0d0", fontFamily: "Georgia, serif" }}>
      {/* Header */}
      <div style={{ borderBottom: "1px solid #2a2a2a", padding: "20px 32px", display: "flex", alignItems: "center", justifyContent: "space-between", background: "#111" }}>
        <div>
          <div style={{ fontSize: "11px", letterSpacing: "0.2em", color: "#8a6", textTransform: "uppercase", marginBottom: "4px" }}>Lilly Family School of Philanthropy</div>
          <div style={{ fontSize: "18px", fontWeight: "700", color: "#e8e0d0" }}>Oral Exam Simulator</div>
        </div>
        <div style={{ display: "flex", gap: "8px" }}>
          {phase !== "home" && <button onClick={() => { setPhase("home"); setStudyView(null); }} style={btn("ghost")}>← Back</button>}
          <button onClick={() => setStudyView(studyView ? null : "concepts")} style={btn("ghost")}>📚 Study Guide</button>
        </div>
      </div>

      <div style={{ maxWidth: "820px", margin: "0 auto", padding: "32px 24px" }}>

        {/* Study Guide */}
        {studyView && (
          <div style={{ background: "#1a1a1a", border: "1px solid #2a2a2a", borderRadius: "8px", padding: "24px", marginBottom: "28px" }}>
            <div style={{ display: "flex", gap: "8px", marginBottom: "20px", flexWrap: "wrap" }}>
              {["concepts", "questions", "scenarios"].map(v => (
                <button key={v} onClick={() => setStudyView(v)} style={btn(studyView === v ? "active" : "ghost")}>
                  {v === "concepts" ? "Key Concepts" : v === "questions" ? "All Questions" : "All Scenarios"}
                </button>
              ))}
            </div>

            {studyView === "concepts" && (
              <div>
                <div style={{ fontSize: "13px", color: "#8a6", letterSpacing: "0.15em", textTransform: "uppercase", marginBottom: "16px" }}>Core Frameworks</div>
                {CONCEPTS.map(c => <ConceptCard key={c.label} label={c.label} body={c.body} />)}
              </div>
            )}

            {studyView === "questions" && (
              <div>
                <div style={{ fontSize: "13px", color: "#8a6", letterSpacing: "0.15em", textTransform: "uppercase", marginBottom: "16px" }}>All 12 Exam Questions</div>
                {QUESTIONS.map(q => (
                  <div key={q.id} style={{ marginBottom: "20px", borderLeft: "2px solid #2a4a2a", paddingLeft: "16px" }}>
                    <div style={{ fontSize: "14px", color: "#e8e0d0", marginBottom: "6px", lineHeight: "1.5" }}>
                      <span style={{ color: "#8a6", marginRight: "8px" }}>Q{q.id}.</span>{q.text}
                    </div>
                    <div style={{ fontSize: "12px", color: "#666", marginBottom: "4px" }}>Key concepts: {q.concepts.join(" · ")}</div>
                    <div style={{ fontSize: "12px", color: "#556", marginBottom: "8px", fontStyle: "italic" }}>{q.hints}</div>
                    <button onClick={() => pickQuestion(q)} style={{ ...btn("ghost"), fontSize: "11px", padding: "4px 10px" }}>Practice this →</button>
                  </div>
                ))}
              </div>
            )}

            {studyView === "scenarios" && (
              <div>
                <div style={{ fontSize: "13px", color: "#8a6", letterSpacing: "0.15em", textTransform: "uppercase", marginBottom: "16px" }}>All Scenarios</div>
                {SCENARIOS.map(s => (
                  <div key={s.id} style={{ marginBottom: "20px", borderLeft: "2px solid #3a3a2a", paddingLeft: "16px" }}>
                    <div style={{ fontSize: "13px", color: "#ca9", fontWeight: "700", marginBottom: "6px" }}>Scenario {s.id}: {s.title}</div>
                    <div style={{ fontSize: "13px", color: "#aaa", lineHeight: "1.6" }}>{s.text}</div>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}

        {/* HOME */}
        {phase === "home" && !studyView && (
          <div style={{ textAlign: "center", paddingTop: "48px" }}>
            <div style={{ fontSize: "13px", color: "#8a6", letterSpacing: "0.15em", textTransform: "uppercase", marginBottom: "12px" }}>Final Oral Synthesis Exam</div>
            <h1 style={{ fontSize: "32px", color: "#e8e0d0", marginBottom: "8px", lineHeight: "1.2" }}>Grantmaking & the Role<br />of Foundations</h1>
            <div style={{ fontSize: "14px", color: "#666", marginBottom: "48px" }}>Prof. Ash Enrici · Spring 2026 · 12 questions · 7 scenarios</div>
            <button onClick={drawRandom} style={{ ...btn("primary"), display: "block", width: "100%", maxWidth: "360px", margin: "0 auto 12px", padding: "16px", fontSize: "16px" }}>
              🎲 Draw Random Question + Scenario
            </button>
            <div style={{ fontSize: "12px", color: "#555", marginBottom: "48px" }}>Simulates real exam conditions · 5-min prep timer included</div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: "16px", textAlign: "left" }}>
              {[{ icon: "⏱", label: "12–15 min", sub: "total exam time" }, { icon: "✏️", label: "5 min", sub: "silent prep" }, { icon: "💬", label: "7–10 min", sub: "conversation" }].map(s => (
                <div key={s.label} style={{ background: "#1a1a1a", border: "1px solid #2a2a2a", borderRadius: "6px", padding: "16px", textAlign: "center" }}>
                  <div style={{ fontSize: "24px", marginBottom: "4px" }}>{s.icon}</div>
                  <div style={{ fontSize: "18px", color: "#e8e0d0", fontWeight: "700" }}>{s.label}</div>
                  <div style={{ fontSize: "12px", color: "#666" }}>{s.sub}</div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* PREP */}
        {phase === "prep" && selectedQuestion && selectedScenario && (
          <div>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: "24px" }}>
              <div style={{ fontSize: "13px", color: "#8a6", letterSpacing: "0.15em", textTransform: "uppercase" }}>Prep Phase — 5 Minutes</div>
              <div style={{ display: "flex", alignItems: "center", gap: "16px" }}>
                <svg width="90" height="90" viewBox="0 0 90 90">
                  <circle cx="45" cy="45" r={circleR} fill="none" stroke="#1a2a1a" strokeWidth="6" />
                  <circle cx="45" cy="45" r={circleR} fill="none" stroke={prepTime < 60 ? "#aa4444" : "#4a8a4a"} strokeWidth="6" strokeDasharray={circumference} strokeDashoffset={dashOffset} strokeLinecap="round" transform="rotate(-90 45 45)" style={{ transition: "stroke-dashoffset 1s linear" }} />
                  <text x="45" y="50" textAnchor="middle" fill={prepTime < 60 ? "#aa4444" : "#8dba8d"} fontSize="16" fontFamily="Georgia" fontWeight="700">{mins}:{secs.toString().padStart(2, "0")}</text>
                </svg>
                {!prepActive
                  ? <button onClick={() => setPrepActive(true)} style={btn("primary")}>{prepTime === 300 ? "▶ Start Timer" : "▶ Resume"}</button>
                  : <button onClick={() => setPrepActive(false)} style={btn("ghost")}>⏸ Pause</button>}
              </div>
            </div>

            <div style={{ background: "#141f14", border: "1px solid #2a4a2a", borderRadius: "8px", padding: "24px", marginBottom: "20px" }}>
              <div style={{ fontSize: "11px", color: "#8a6", letterSpacing: "0.15em", textTransform: "uppercase", marginBottom: "12px" }}>Big Question</div>
              <div style={{ fontSize: "16px", color: "#e8e0d0", lineHeight: "1.6", marginBottom: "16px" }}>{selectedQuestion.text}</div>
              <div style={{ fontSize: "12px", color: "#556" }}><span style={{ color: "#8a6" }}>Key concepts: </span>{selectedQuestion.concepts.join(" · ")}</div>
              <div style={{ fontSize: "12px", color: "#668", marginTop: "6px", fontStyle: "italic" }}>{selectedQuestion.hints}</div>
            </div>

            <div style={{ background: "#1a1a10", border: "1px solid #3a3a20", borderRadius: "8px", padding: "24px", marginBottom: "24px" }}>
              <div style={{ fontSize: "11px", color: "#ca9", letterSpacing: "0.15em", textTransform: "uppercase", marginBottom: "12px" }}>Scenario {selectedScenario.id}: {selectedScenario.title}</div>
              <div style={{ fontSize: "14px", color: "#c8c0b0", lineHeight: "1.7" }}>{selectedScenario.text}</div>
            </div>

            <button onClick={() => setPhase("answering")} style={{ ...btn("primary"), width: "100%", padding: "14px" }}>I'm Ready — Start Answering →</button>
          </div>
        )}

        {/* ANSWERING */}
        {phase === "answering" && (
          <div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "16px", marginBottom: "24px" }}>
              <div style={{ background: "#141f14", border: "1px solid #2a4a2a", borderRadius: "6px", padding: "16px" }}>
                <div style={{ fontSize: "10px", color: "#8a6", letterSpacing: "0.15em", textTransform: "uppercase", marginBottom: "8px" }}>Question</div>
                <div style={{ fontSize: "13px", color: "#c0d8c0", lineHeight: "1.5" }}>{selectedQuestion.text}</div>
              </div>
              <div style={{ background: "#1a1a10", border: "1px solid #3a3a20", borderRadius: "6px", padding: "16px" }}>
                <div style={{ fontSize: "10px", color: "#ca9", letterSpacing: "0.15em", textTransform: "uppercase", marginBottom: "8px" }}>Scenario: {selectedScenario.title}</div>
                <div style={{ fontSize: "12px", color: "#b8b0a0", lineHeight: "1.5" }}>{selectedScenario.text.substring(0, 180)}…</div>
              </div>
            </div>
            <div style={{ fontSize: "12px", color: "#666", marginBottom: "8px" }}>Type your answer as you'd speak it. Address the big question, then apply concepts to the scenario.</div>
            <textarea
              value={userAnswer}
              onChange={e => setUserAnswer(e.target.value)}
              placeholder="Start talking through your answer... Address the big question using course concepts, then analyze the scenario."
              style={{ width: "100%", minHeight: "240px", background: "#1a1a1a", border: "1px solid #333", borderRadius: "6px", color: "#e8e0d0", fontFamily: "Georgia, serif", fontSize: "14px", lineHeight: "1.7", padding: "16px", resize: "vertical" }}
            />
            <div style={{ fontSize: "11px", color: "#444", marginTop: "4px", textAlign: "right", marginBottom: "16px" }}>{userAnswer.split(/\s+/).filter(Boolean).length} words</div>
            <button onClick={getFeedback} disabled={loading || !userAnswer.trim()} style={{ ...btn("primary"), width: "100%", padding: "14px", opacity: (loading || !userAnswer.trim()) ? 0.5 : 1 }}>
              {loading ? "Getting feedback…" : "Submit for Feedback →"}
            </button>
          </div>
        )}

        {/* FEEDBACK */}
        {phase === "feedback" && (
          <div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "12px", marginBottom: "24px" }}>
              <div style={{ background: "#141f14", border: "1px solid #2a4a2a", borderRadius: "6px", padding: "14px" }}>
                <div style={{ fontSize: "10px", color: "#8a6", textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: "6px" }}>Question</div>
                <div style={{ fontSize: "12px", color: "#c0d8c0" }}>{selectedQuestion.text}</div>
              </div>
              <div style={{ background: "#1a1a10", border: "1px solid #3a3a20", borderRadius: "6px", padding: "14px" }}>
                <div style={{ fontSize: "10px", color: "#ca9", textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: "6px" }}>Scenario</div>
                <div style={{ fontSize: "12px", color: "#b8b0a0" }}>{selectedScenario.title}</div>
              </div>
            </div>
            <div style={{ background: "#1a1a1a", border: "1px solid #333", borderRadius: "8px", padding: "20px", marginBottom: "20px" }}>
              <div style={{ fontSize: "10px", color: "#aaa", textTransform: "uppercase", letterSpacing: "0.15em", marginBottom: "12px" }}>Your Answer</div>
              <div style={{ fontSize: "13px", color: "#888", lineHeight: "1.7", fontStyle: "italic" }}>{userAnswer}</div>
            </div>
            <div style={{ background: "#141a24", border: "1px solid #2a3a5a", borderRadius: "8px", padding: "24px", marginBottom: "24px" }}>
              <div style={{ fontSize: "11px", color: "#6a9aca", letterSpacing: "0.15em", textTransform: "uppercase", marginBottom: "16px" }}>Feedback</div>
              <div style={{ fontSize: "14px", color: "#c0cce0", lineHeight: "1.8", whiteSpace: "pre-wrap" }}>{feedback}</div>
            </div>
            <div style={{ display: "flex", gap: "12px" }}>
              <button onClick={drawRandom} style={{ ...btn("primary"), flex: 1, padding: "12px" }}>🎲 Draw New Question</button>
              <button onClick={() => { setPhase("answering"); setFeedback(""); }} style={{ ...btn("ghost"), flex: 1, padding: "12px" }}>↩ Revise Answer</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
